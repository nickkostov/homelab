apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-self
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-100"
  finalizers:
    - resources-finalizer.argocd.argoproj.io/background
spec:
  project: argocd
  source:
    repoURL: https://github.com/nickkostov/homelab
    path: clusters/homelab/manifests/argocd/chart
    targetRevision: HEAD
    helm:
      releaseName: argocd
      valueFiles:
        - values.yaml
        - notifications-values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: argocd-secret
      jsonPointers:
        - /data
  info:
    - name: "description"
      value: "ArgoCD self-managed via Helm"