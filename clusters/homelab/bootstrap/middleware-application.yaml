apiVersion: argoproj.io/v1alpha1
kind: Application
metadata: 
  name: middleware
  namespace: argocd
  annotations: 
    argocd.argoproj.io/sync-wave: "-100"
  finalizers:
    - resources-finalizer.argocd.argoproj.io/background
spec: 
  project: argocd
  source:
    repoURL: https://github.com/nickkkostov/homelab
    path: clusters/homelab/manifests/middleware
    targetRevision: HEAD
    directory:
      recurse: true
      exclude: '{**/chart/*,**/objects/*}'
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
  info:
    - name: "description"
      value: "Middleware applications"