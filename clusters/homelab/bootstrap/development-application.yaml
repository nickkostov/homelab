apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: developmentapps
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-100"
  finalizers:
    - resources-finalizer.argocd.argoproj.io/background
spec: 
  project: argocd
  source:
    repoURL: https://github.com/nickkostov/homelab
    path: clusters/homelab/manifests/developmentapps
    targetRevision: HEAD
    directory:
      recurse: false  # Changed from true - only looks at top level
      include: '{*/application.yaml,project.yaml}'
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
