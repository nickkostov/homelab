apiVersion: batch/v1
kind: CronJob
metadata:
  name: vault-auto-unseal
  namespace: vault
spec:
  schedule: "*/2 * * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: unseal
              image: hashicorp/vault:1.17.2
              env:
                - name: VAULT_ADDR
                  value: "https://vault.vault.svc.cluster.local:443"
                - name: VAULT_SKIP_VERIFY
                  value: "true"

                - name: VAULT_UNSEAL_KEY_1
                  valueFrom:
                    secretKeyRef:
                      name: vault-unseal-keys
                      key: VAULT_UNSEAL_KEY_1
                - name: VAULT_UNSEAL_KEY_2
                  valueFrom:
                    secretKeyRef:
                      name: vault-unseal-keys
                      key: VAULT_UNSEAL_KEY_2
                - name: VAULT_UNSEAL_KEY_3
                  valueFrom:
                    secretKeyRef:
                      name: vault-unseal-keys
                      key: VAULT_UNSEAL_KEY_3
              command:
                - /bin/sh
                - -c
                - |
                  # Wait for Vault to be reachable (exit code 0=unsealed, 1=error, 2=sealed)
                  for i in $(seq 1 30); do
                    vault status -format=json >/dev/null 2>&1
                    RC=$?
                    if [ $RC -eq 0 ] || [ $RC -eq 2 ]; then
                      echo "Vault is reachable."
                      break
                    fi
                    echo "Vault not ready, retrying in 5s... ($i/30)"
                    sleep 5
                  done
                  
                  vault status -format=json >/dev/null 2>&1
                  RC=$?
                  if [ $RC -eq 2 ]; then
                    echo "Vault is sealed. Unsealing..."
                    vault operator unseal "$VAULT_UNSEAL_KEY_1"
                    vault operator unseal "$VAULT_UNSEAL_KEY_2"
                    vault operator unseal "$VAULT_UNSEAL_KEY_3"
                    echo "Unseal complete."
                  elif [ $RC -eq 0 ]; then
                    echo "Vault is already unsealed."
                  else
                    echo "Vault is unreachable after retries."
                  fi
          restartPolicy: OnFailure