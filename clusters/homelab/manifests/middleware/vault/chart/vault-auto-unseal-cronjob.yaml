apiVersion: batch/v1
kind: CronJob
metadata:
  name: vault-auto-unseal
  namespace: vault
spec:
  schedule: "*/2 * * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: unseal
              image: hashicorp/vault:1.17.2
              env:
                - name: VAULT_ADDR
                  value: "https://vault.vault.svc.cluster.local:443"
                - name: VAULT_SKIP_VERIFY
                  value: "true"
                - name: VAULT_UNSEAL_KEY_1
                  valueFrom:
                    secretKeyRef:
                      name: vault-unseal-keys
                      key: VAULT_UNSEAL_KEY_1
                - name: VAULT_UNSEAL_KEY_2
                  valueFrom:
                    secretKeyRef:
                      name: vault-unseal-keys
                      key: VAULT_UNSEAL_KEY_2
                - name: VAULT_UNSEAL_KEY_3
                  valueFrom:
                    secretKeyRef:
                      name: vault-unseal-keys
                      key: VAULT_UNSEAL_KEY_3
              command:
                - /bin/sh
                - -c
                - |
                  # Wait for Vault to be reachable
                  for i in $(seq 1 30); do
                    STATUS=$(vault status -format=json 2>/dev/null)
                    if [ $? -eq 0 ] || echo "$STATUS" | grep -q '"sealed"'; then
                      break
                    fi
                    echo "Vault not ready, retrying in 5s... ($i/30)"
                    sleep 5
                  done
                  
                  SEALED=$(vault status -format=json 2>/dev/null | grep -o '"sealed":true')
                  if [ "$SEALED" = '"sealed":true' ]; then
                    echo "Vault is sealed. Unsealing..."
                    vault operator unseal "$VAULT_UNSEAL_KEY_1"
                    vault operator unseal "$VAULT_UNSEAL_KEY_2"
                    vault operator unseal "$VAULT_UNSEAL_KEY_3"
                    echo "Unseal complete."
                  else
                    echo "Vault is already unsealed or unreachable after retries."
                  fi
          restartPolicy: OnFailure