apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: vault-tls
  namespace: vault
spec:
  secretName: vault-tls
  issuerRef:
    name: ca-issuer
    kind: ClusterIssuer
  commonName: vault.range.local
  dnsNames:
    - vault.range.local
    - vault.vault.svc.cluster.local
    - vault.vault.svc