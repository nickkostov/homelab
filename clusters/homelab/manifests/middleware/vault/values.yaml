server:
  enabled: true
  dataStorage:
    enabled: true
    size: 1Gi
    storageClass: local-path
  standalone:
    enabled: true
    config: |
      ui = true
      listener "tcp" {
        tls_disable = 1
        address = "[::]:8200"
        cluster_address = "[::]:8201"
      }
      storage "raft" {
        path = "/vault/data"
      }
  ha:
    enabled: false
  service:
    type: LoadBalancer
    annotations:
      metallb.universe.tf/loadBalancerIPs: 192.168.2.204

ui:
  enabled: true
  serviceType: ClusterIP

injector:
  enabled: false