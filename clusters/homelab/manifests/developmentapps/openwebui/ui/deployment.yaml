# openwebui-deployment-persistent-argocd-keep.yaml
apiVersion: v1
kind: Namespace
metadata:
  name: openwebui
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openwebui-data
  namespace: openwebui
  annotations:
    argocd.argoproj.io/sync-options: Prune=false,Delete=false
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openwebui
  namespace: openwebui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openwebui
  template:
    metadata:
      labels:
        app: openwebui
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: openwebui
          image: ghcr.io/open-webui/open-webui:v0.8.3
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 8443
              name: https
          env:
            - name: OLLAMA_BASE_URL
              value: "http://everest.range.local:11434"
            - name: WEBUI_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: openwebui-secret
                  key: WEBUI_SECRET_KEY
            # Enable HTTPS in Open WebUI
            - name: ENABLE_HTTPS
              value: "true"
            - name: SSL_CERTFILE
              value: "/app/backend/certs/tls.crt"
            - name: SSL_KEYFILE
              value: "/app/backend/certs/tls.key"
          volumeMounts:
            - name: data
              mountPath: /app/backend/data
            - name: openwebui-tls
              secretName: openwebui-tls
              defaultMode: 0440
              mountPath: /app/backend/certs
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "4Gi"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: openwebui-data
        - name: openwebui-tls
          secret:
            secretName: openwebui-tls