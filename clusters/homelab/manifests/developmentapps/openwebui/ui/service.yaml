apiVersion: v1
kind: Service
metadata:
  name: openwebui
  namespace: openwebui
  annotations:
    metallb.universe.tf/loadBalancerIPs: 192.168.2.203
spec:
  type: LoadBalancer
  selector:
    app: openwebui
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
    - name: https
      port: 443
      targetPort: 8443
      protocol: TCP