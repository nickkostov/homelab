# Update argocd Application with server-side apply
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-140"
  finalizers:
    - resources-finalizer.argocd.argoproj.io/background
spec:
  project: argocd
  source:
    repoURL: https://github.com/nickkostov/homelab
    path: clusters/homelab/manifests/baseline/argocd/chart
    targetRevision: HEAD
    helm:
      releaseName: argocd
      version: v3
      valueFiles:
        - values.yaml
  destination:
    namespace: argocd
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: false
      selfHeal: false
    syncOptions:
      - CreateNamespace=false
      - PruneLast=true
      - PrunePropagationPolicy=foreground
      - ServerSideApply=true  # Critical for CRDs
      - Replace=true  # Replace instead of patch for CRDs
      - SkipHooks=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:  # Ignore large CRD annotation changes
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jsonPointers:
        - /metadata/annotations
  info:
    - name: "Description"
      value: "ArgoCD self-management"