apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: grafana-tls
  namespace: monitoring
spec:
  secretName: grafana-tls
  duration: 2160h # 90 days
  renewBefore: 360h # 15 days
  issuerRef:
    name: ca-issuer
    kind: ClusterIssuer
  dnsNames:
    - grafana.range.local
  privateKey:
    algorithm: RSA
    size: 2048