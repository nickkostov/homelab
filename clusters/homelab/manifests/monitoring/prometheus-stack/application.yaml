apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: argocd
  source:
    repoURL: https://github.com/nickkostov/homelab
    path: clusters/homelab/manifests/monitoring/prometheus-stack/chart
    targetRevision: HEAD
    helm:
      releaseName: prometheus-stack
      valueFiles:
        - values.yaml
  destination:
    namespace: monitoring
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
